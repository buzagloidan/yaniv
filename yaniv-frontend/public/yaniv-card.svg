<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1536" viewBox="0 0 1024 1536" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1536" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#63B5FF"/>
      <stop offset="100%" stop-color="#2D78D8"/>
    </linearGradient>

    <linearGradient id="titleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF27A"/>
      <stop offset="100%" stop-color="#FFD84D"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B3E73" flood-opacity="0.35"/>
    </filter>

    <g id="palm">
      <path d="M0 0 C 18 -38, 58 -66, 118 -78 C 80 -46, 56 -18, 42 12 C 28 8, 14 4, 0 0 Z" fill="#A9D8FF" opacity="0.28"/>
      <path d="M0 0 C -18 -38, -58 -66, -118 -78 C -80 -46, -56 -18, -42 12 C -28 8, -14 4, 0 0 Z" fill="#A9D8FF" opacity="0.28"/>
      <path d="M0 0 C 36 -22, 86 -26, 138 -12 C 94 2, 56 16, 28 38 C 18 24, 10 12, 0 0 Z" fill="#A9D8FF" opacity="0.24"/>
      <path d="M0 0 C -36 -22, -86 -26, -138 -12 C -94 2, -56 16, -28 38 C -18 24, -10 12, 0 0 Z" fill="#A9D8FF" opacity="0.24"/>
      <path d="M0 0 C 10 44, 10 92, 0 148 C -10 92, -10 44, 0 0 Z" fill="#A9D8FF" opacity="0.22"/>
    </g>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1536" rx="96" fill="url(#bg)"/>

  <!-- inner border -->
  <rect x="26" y="26" width="972" height="1484" rx="84" fill="none" stroke="#F5FBFF" stroke-width="18"/>
  <rect x="48" y="48" width="928" height="1440" rx="72" fill="none" stroke="#214E8C" stroke-opacity="0.85" stroke-width="10"/>

  <!-- palm motifs -->
  <g transform="translate(276 310) scale(1.2)">
    <use href="#palm"/>
  </g>
  <g transform="translate(748 1230) scale(1.2)">
    <use href="#palm"/>
  </g>
  <g transform="translate(748 310) scale(0.78) rotate(18)">
    <use href="#palm"/>
  </g>
  <g transform="translate(276 1230) scale(0.78) rotate(-18)">
    <use href="#palm"/>
  </g>

  <!-- center badge -->
  <rect x="188" y="574" width="648" height="388" rx="48" fill="#2B6DC8" fill-opacity="0.24" stroke="#D8F0FF" stroke-opacity="0.45" stroke-width="8"/>

  <!-- title -->
  <g filter="url(#shadow)">
    <text x="512" y="800"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="146"
          font-weight="900"
          letter-spacing="1"
          fill="url(#titleFill)"
          stroke="#27486E"
          stroke-width="18"
          paint-order="stroke fill">
      Yaniv
    </text>
  </g>

  <!-- decorative dots -->
  <circle cx="152" cy="180" r="8" fill="#EAF7FF" opacity="0.8"/>
  <circle cx="872" cy="222" r="6" fill="#EAF7FF" opacity="0.7"/>
  <circle cx="176" cy="1340" r="7" fill="#EAF7FF" opacity="0.7"/>
  <circle cx="840" cy="1320" r="8" fill="#EAF7FF" opacity="0.8"/>

  <!-- subtle corner icons -->
  <g opacity="0.55">
    <text x="102" y="138" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#EAF7FF">Y</text>
    <text x="922" y="138" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#EAF7FF">Y</text>
    <text x="102" y="1448" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#EAF7FF">Y</text>
    <text x="922" y="1448" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#EAF7FF">Y</text>
  </g>
</svg>
