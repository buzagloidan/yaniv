<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer glow oval -->
    <radialGradient id="outerGlow" cx="50%" cy="52%" r="50%">
      <stop offset="0%" stop-color="#AEEEFF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#62CFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E9FD4" stop-opacity="0"/>
    </radialGradient>

    <!-- Main oval fill -->
    <radialGradient id="ovalFill" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1478C8"/>
      <stop offset="100%" stop-color="#0A3E6E"/>
    </radialGradient>

    <!-- Sand ground -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D98A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>

    <!-- Hebrew text gold -->
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF27A"/>
      <stop offset="45%" stop-color="#FFDC40"/>
      <stop offset="100%" stop-color="#F0A800"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#061E3A" flood-opacity="0.45"/>
    </filter>
    <filter id="textGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#061E3A" flood-opacity="0.6"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#061E3A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer glow halo -->
  <ellipse cx="260" cy="245" rx="248" ry="228" fill="url(#outerGlow)"/>

  <!-- Main oval -->
  <ellipse cx="260" cy="245" rx="228" ry="208" fill="url(#ovalFill)" filter="url(#dropShadow)"/>

  <!-- Oval border ring -->
  <ellipse cx="260" cy="245" rx="228" ry="208" fill="none" stroke="#A8DDFF" stroke-width="4" stroke-opacity="0.6"/>
  <ellipse cx="260" cy="245" rx="218" ry="198" fill="none" stroke="#0A3E6E" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Sandy beach ground -->
  <ellipse cx="260" cy="370" rx="180" ry="44" fill="url(#sandGrad)"/>

  <!-- Water shimmer lines -->
  <ellipse cx="260" cy="388" rx="160" ry="12" fill="#1E6FAA" fill-opacity="0.4"/>
  <ellipse cx="260" cy="396" rx="130" ry="7" fill="#1E6FAA" fill-opacity="0.3"/>

  <!-- LEFT PALM TREE -->
  <g transform="translate(96 340)">
    <!-- trunk -->
    <path d="M0 0 C-4 -30,-6 -70,-2 -120 C2 -70, 4 -30, 0 0 Z" fill="#7A5230"/>
    <!-- fronds -->
    <path d="M-2 -118 C-30 -148,-62 -145,-78 -130 C-54 -128,-30 -122,-2 -118 Z" fill="#2D8A3A"/>
    <path d="M-2 -118 C-8 -152,-2 -178,12 -185 C8 -165, 4 -142,-2 -118 Z" fill="#2D8A3A"/>
    <path d="M-2 -118 C22 -148,52 -148,66 -135 C44 -130,20 -124,-2 -118 Z" fill="#3AA045"/>
    <path d="M-2 -118 C-32 -128,-56 -108,-60 -90 C-38 -96,-18 -107,-2 -118 Z" fill="#3AA045"/>
    <path d="M-2 -118 C14 -130,32 -118,36 -102 C20 -106, 8 -112,-2 -118 Z" fill="#2D8A3A"/>
    <!-- coconuts -->
    <circle cx="-6" cy="-122" r="6" fill="#7A4A1A"/>
    <circle cx="2" cy="-126" r="5" fill="#7A4A1A"/>
  </g>

  <!-- RIGHT PALM TREE -->
  <g transform="translate(424 340)">
    <path d="M0 0 C4 -30,6 -70,2 -120 C-2 -70,-4 -30, 0 0 Z" fill="#7A5230"/>
    <path d="M2 -118 C30 -148,62 -145,78 -130 C54 -128,30 -122, 2 -118 Z" fill="#2D8A3A"/>
    <path d="M2 -118 C8 -152, 2 -178,-12 -185 C-8 -165,-4 -142, 2 -118 Z" fill="#2D8A3A"/>
    <path d="M2 -118 C-22 -148,-52 -148,-66 -135 C-44 -130,-20 -124, 2 -118 Z" fill="#3AA045"/>
    <path d="M2 -118 C32 -128, 56 -108, 60 -90 C38 -96, 18 -107, 2 -118 Z" fill="#3AA045"/>
    <path d="M2 -118 C-14 -130,-32 -118,-36 -102 C-20 -106,-8 -112, 2 -118 Z" fill="#2D8A3A"/>
    <circle cx="6" cy="-122" r="6" fill="#7A4A1A"/>
    <circle cx="-2" cy="-126" r="5" fill="#7A4A1A"/>
  </g>

  <!-- PLAYING CARDS (fan at top-center) -->
  <g filter="url(#cardShadow)">
    <!-- Card 1 – leftmost, rotated left -->
    <g transform="translate(170 158) rotate(-24)">
      <rect width="52" height="74" rx="6" fill="url(#cardGrad)" stroke="#C8D4E8" stroke-width="1"/>
      <text x="6" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#B00020">A</text>
      <text x="6" y="30" font-family="Arial" font-size="11" fill="#B00020">♥</text>
      <text x="26" y="52" font-family="Arial" font-size="24" fill="#B00020" text-anchor="middle">♥</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(210 140) rotate(-10)">
      <rect width="52" height="74" rx="6" fill="url(#cardGrad)" stroke="#C8D4E8" stroke-width="1"/>
      <text x="6" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#1B1B1B">A</text>
      <text x="6" y="30" font-family="Arial" font-size="11" fill="#1B1B1B">♠</text>
      <text x="26" y="52" font-family="Arial" font-size="24" fill="#1B1B1B" text-anchor="middle">♠</text>
    </g>
    <!-- Card 3 – center joker -->
    <g transform="translate(255 135) rotate(3)">
      <rect width="56" height="78" rx="7" fill="url(#cardGrad)" stroke="#C8D4E8" stroke-width="1"/>
      <text x="4" y="18" font-family="Arial" font-size="13" font-weight="bold" fill="#7C22C8">J</text>
      <text x="28" y="54" font-family="Arial" font-size="28" text-anchor="middle">🃏</text>
    </g>
    <!-- Card 4 -->
    <g transform="translate(308 140) rotate(14)">
      <rect width="52" height="74" rx="6" fill="url(#cardGrad)" stroke="#C8D4E8" stroke-width="1"/>
      <text x="6" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#B00020">A</text>
      <text x="6" y="30" font-family="Arial" font-size="11" fill="#B00020">♦</text>
      <text x="26" y="52" font-family="Arial" font-size="24" fill="#B00020" text-anchor="middle">♦</text>
    </g>
    <!-- Card 5 – rightmost -->
    <g transform="translate(347 158) rotate(26)">
      <rect width="52" height="74" rx="6" fill="url(#cardGrad)" stroke="#C8D4E8" stroke-width="1"/>
      <text x="6" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#1B1B1B">A</text>
      <text x="6" y="30" font-family="Arial" font-size="11" fill="#1B1B1B">♣</text>
      <text x="26" y="52" font-family="Arial" font-size="24" fill="#1B1B1B" text-anchor="middle">♣</text>
    </g>
  </g>

  <!-- BANNER SHAPE behind Hebrew text -->
  <rect x="108" y="268" width="304" height="90" rx="14" fill="#0C3A7A" fill-opacity="0.85" stroke="#3A80D0" stroke-width="3"/>

  <!-- Hebrew יניב text -->
  <g filter="url(#textGlow)">
    <text
      x="260" y="338"
      text-anchor="middle"
      font-family="'Arial Black', 'Noto Sans Hebrew', Arial, sans-serif"
      font-size="86"
      font-weight="900"
      fill="url(#goldText)"
      stroke="#1A3A70"
      stroke-width="6"
      paint-order="stroke fill"
      letter-spacing="2"
    >יניב</text>
  </g>

  <!-- DICE (left of center bottom) -->
  <g transform="translate(130 355)">
    <rect width="40" height="40" rx="6" fill="#CC1818" stroke="#8B0000" stroke-width="1.5"/>
    <!-- dots: 5 -->
    <circle cx="10" cy="10" r="4" fill="white"/>
    <circle cx="30" cy="10" r="4" fill="white"/>
    <circle cx="20" cy="20" r="4" fill="white"/>
    <circle cx="10" cy="30" r="4" fill="white"/>
    <circle cx="30" cy="30" r="4" fill="white"/>
  </g>
  <g transform="translate(158 370) rotate(12)">
    <rect width="36" height="36" rx="5" fill="#CC1818" stroke="#8B0000" stroke-width="1.5"/>
    <!-- dots: 3 -->
    <circle cx="10" cy="10" r="3.5" fill="white"/>
    <circle cx="18" cy="18" r="3.5" fill="white"/>
    <circle cx="26" cy="26" r="3.5" fill="white"/>
  </g>

  <!-- SUNGLASSES (small, bottom-left) -->
  <g transform="translate(105 390)">
    <rect x="0" y="0" width="30" height="18" rx="9" fill="#1A1A1A" stroke="#444" stroke-width="1.5"/>
    <rect x="34" y="0" width="30" height="18" rx="9" fill="#1A1A1A" stroke="#444" stroke-width="1.5"/>
    <line x1="30" y1="9" x2="34" y2="9" stroke="#555" stroke-width="2"/>
    <line x1="-8" y1="9" x2="0" y2="9" stroke="#555" stroke-width="2"/>
    <line x1="64" y1="9" x2="72" y2="9" stroke="#555" stroke-width="2"/>
    <!-- lens glare -->
    <path d="M5 4 Q12 2 20 5" stroke="white" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
    <path d="M39 4 Q46 2 54 5" stroke="white" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  </g>

  <!-- COCONUT DRINK (bottom-right) -->
  <g transform="translate(350 348)">
    <!-- coconut body -->
    <ellipse cx="30" cy="38" rx="28" ry="30" fill="#6B3A1F"/>
    <ellipse cx="30" cy="28" rx="28" ry="22" fill="#8B4E28"/>
    <!-- highlight -->
    <ellipse cx="22" cy="20" rx="10" ry="8" fill="#A0622F" fill-opacity="0.6"/>
    <!-- straw -->
    <line x1="36" y1="12" x2="52" y2="-8" stroke="#F5B800" stroke-width="4" stroke-linecap="round"/>
    <!-- umbrella -->
    <path d="M52 -8 Q60 -22 70 -18 Q62 -10 52 -8 Z" fill="#FF6B35"/>
    <path d="M52 -8 Q58 -24 48 -28 Q46 -18 52 -8 Z" fill="#FFD700"/>
    <path d="M52 -8 Q42 -22 36 -18 Q42 -10 52 -8 Z" fill="#FF6B35"/>
    <!-- orange slice -->
    <circle cx="30" cy="10" r="10" fill="#FF8C00"/>
    <circle cx="30" cy="10" r="7" fill="#FFA500"/>
    <line x1="30" y1="3" x2="30" y2="17" stroke="white" stroke-width="1"/>
    <line x1="23" y1="10" x2="37" y2="10" stroke="white" stroke-width="1"/>
    <line x1="25" y1="5" x2="35" y2="15" stroke="white" stroke-width="1"/>
    <line x1="35" y1="5" x2="25" y2="15" stroke="white" stroke-width="1"/>
  </g>

  <!-- Sparkle stars around the logo -->
  <g fill="#FFFFFF" opacity="0.75">
    <polygon points="76,160 79,168 87,168 81,173 83,181 76,176 69,181 71,173 65,168 73,168" transform="scale(0.7) translate(40,100)"/>
    <polygon points="430,100 432,107 439,107 434,111 436,118 430,114 424,118 426,111 421,107 428,107" transform="scale(0.6) translate(260,50)"/>
    <circle cx="455" cy="178" r="3" fill="white" opacity="0.8"/>
    <circle cx="72" cy="195" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="430" cy="305" r="2" fill="white" opacity="0.6"/>
    <circle cx="100" cy="310" r="2.5" fill="white" opacity="0.65"/>
  </g>
</svg>
