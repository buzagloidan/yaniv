<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="creamFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9DE"/>
      <stop offset="100%" stop-color="#F6E7A8"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#E0A800"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1000" height="420" fill="none"/>

  <g filter="url(#shadow)">
    <!-- main word -->
    <text x="500" y="275"
          text-anchor="middle"
          font-family="Arial Black, Arial, Helvetica, sans-serif"
          font-size="250"
          font-weight="900"
          letter-spacing="2"
          fill="url(#creamFill)"
          stroke="#1E1E1E"
          stroke-width="22"
          paint-order="stroke fill">יניב</text>

    <!-- warm inner accent -->
    <text x="500" y="275"
          text-anchor="middle"
          font-family="Arial Black, Arial, Helvetica, sans-serif"
          font-size="250"
          font-weight="900"
          letter-spacing="2"
          fill="none"
          stroke="url(#goldEdge)"
          stroke-width="7">יניב</text>
  </g>
</svg>
