name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'yaniv-backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yaniv-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: yaniv-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.toml
        run: |
          cat > wrangler.toml << EOF
          name = "yaniv-backend"
          main = "src/index.ts"
          compatibility_date = "2024-09-23"
          compatibility_flags = ["nodejs_compat"]

          [[durable_objects.bindings]]
          name = "GAME_TABLE"
          class_name = "GameTable"

          [[migrations]]
          tag = "v1"
          new_classes = ["GameTable"]

          [[d1_databases]]
          binding = "DB"
          database_name = "yaniv-db"
          database_id = "${{ secrets.D1_DATABASE_ID }}"

          [[kv_namespaces]]
          binding = "SESSIONS"
          id = "${{ secrets.KV_NAMESPACE_ID }}"

          [vars]
          ENVIRONMENT = "production"
          ALLOWED_ORIGINS = "${{ secrets.ALLOWED_ORIGINS }}"

          [[analytics_engine_datasets]]
          binding = "ANALYTICS"
          dataset = "yaniv_events"

          [observability]
          enabled = true
          head_sampling_rate = 1

          [observability.logs]
          enabled = true
          head_sampling_rate = 1
          persist = true
          invocation_logs = true
          EOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply yaniv-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST https://api.notifikations.com/api/v1/ntf_dev_o38a4nfj7aamj7bn5o36niluxhk62py2 \
            -d "🚨 Yaniv backend deploy FAILED | branch: ${{ github.ref_name }} | commit: $(echo ${{ github.sha }} | cut -c1-7) | ${{ github.event.head_commit.message }}"
